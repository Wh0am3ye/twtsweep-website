[[redirects]]
from = "/"
to = "/cy/"
status = 302
conditions = {Language = ["cy"]}

[[redirects]]
from = "/"
to = "/en/"
status = 302

[[redirects]]
from = "/en/*"
to = "/en/404.html"
status = 404

[[redirects]]
from = "/cy/*"
to = "/cy/404.html"
status = 404

[[redirects]]
from = "/*"
to = "/404.html"
status = 404